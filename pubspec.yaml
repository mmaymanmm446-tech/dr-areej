name: wellness_by_dr_areej
description: Wellness By Dr.Areej - Premium Medical Platform
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  provider: ^6.1.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  glassmorphism: ^3.0.0
  dio: ^5.4.0
  retrofit: ^4.0.1
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.5
  file_picker: ^6.1.1
  speech_to_text: ^6.5.1
  audioplayers: ^5.2.1
  flutter_stripe: ^10.0.0
  markdown: ^7.2.1
  intl: ^0.18.1
  url_launcher: ^6.2.1
  share_plus: ^7.2.1
  google_maps_flutter: ^2.5.3
  fl_chart: ^0.66.0
  flutter_local_notifications: ^16.3.0
  google_sign_in: ^6.0.0
  sign_in_with_apple: ^6.0.0
  http: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
